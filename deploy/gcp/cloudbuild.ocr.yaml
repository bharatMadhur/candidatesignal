substitutions:
  _IMAGE: us-central1-docker.pkg.dev/candidatesignal/candidatesignal/ocr:latest

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.ocr
      - -t
      - ${_IMAGE}
      - .

images:
  - ${_IMAGE}
