services:
  caddy:
    image: caddy:2.8-alpine
    environment:
      APEX_DOMAIN: ${APEX_DOMAIN:-candidatesignal.ai}
      WWW_DOMAIN: ${WWW_DOMAIN:-www.candidatesignal.ai}
      APP_DOMAIN: ${APP_DOMAIN:-app.candidatesignal.ai}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-staging-disabled.invalid}
      STAGING_BASIC_AUTH_USER: ${STAGING_BASIC_AUTH_USER:-staging}
      STAGING_BASIC_AUTH_HASH: ${STAGING_BASIC_AUTH_HASH:-$$2a$$14$$4GFECT9OPnHmH.mzWSXNQuw/4FGFeEyZieoOzMwzEl10LBgBCLEGy}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui
    restart: unless-stopped

  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.3
    command:
      - "--structured-logs"
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${CLOUDSQL_INSTANCE_CONNECTION_NAME}"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-secrets/database-url
      BETTER_AUTH_SECRET_FILE: /run/candidatesignal-secrets/better-auth-secret
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      RESUME_INTEL_BOOTSTRAP_TOKEN_FILE: /run/candidatesignal-secrets/bootstrap-token
      RESUME_INTEL_ENABLE_LEGACY_AUTH: "0"
      RESUME_INTEL_ALLOW_UNSIGNED_BETTER_AUTH_BEARER: "0"
      RESUME_INTEL_SELF_SIGNUP_ENABLED: ${RESUME_INTEL_SELF_SIGNUP_ENABLED:-1}
      RESUME_INTEL_SELF_SIGNUP_SEAT_LIMIT: ${RESUME_INTEL_SELF_SIGNUP_SEAT_LIMIT:-5}
      RESUME_INTEL_JSON_LOGS: "1"
      RESUME_INTEL_STORAGE_BACKEND: gcs
      RESUME_INTEL_GCS_BUCKET: ${RESUME_INTEL_GCS_BUCKET}
      RESUME_INTEL_ALERT_WEBHOOK_URL_FILE: /run/candidatesignal-secrets/alert-webhook-url
      RESUME_INTEL_MAIL_ENABLED: ${RESUME_INTEL_MAIL_ENABLED:-0}
      RESUME_INTEL_MAIL_DRY_RUN: ${RESUME_INTEL_MAIL_DRY_RUN:-1}
      RESUME_INTEL_MAIL_PROVIDER: ${RESUME_INTEL_MAIL_PROVIDER:-resend}
      RESUME_INTEL_MAIL_FROM_EMAIL: ${RESUME_INTEL_MAIL_FROM_EMAIL:-no-reply@candidatesignal.ai}
      RESUME_INTEL_MAIL_FROM_NAME: ${RESUME_INTEL_MAIL_FROM_NAME:-candidateSignal.ai}
      RESUME_INTEL_MAIL_REPLY_TO: ${RESUME_INTEL_MAIL_REPLY_TO:-}
      RESUME_INTEL_APP_BASE_URL: ${RESUME_INTEL_APP_BASE_URL:-}
      RESEND_API_KEY_FILE: /run/candidatesignal-secrets/resend-api-key
      RESUME_INTEL_LITELLM_BASE_URL: ${RESUME_INTEL_LITELLM_BASE_URL:-https://api.openai.com/v1}
      RESUME_INTEL_LITELLM_API_KEY_FILE: /run/candidatesignal-secrets/litellm-api-key
      RESUME_INTEL_LITELLM_MODEL: ${RESUME_INTEL_LITELLM_MODEL:-openai/gpt-5-nano}
      RESUME_INTEL_EMBEDDING_MODEL: ${RESUME_INTEL_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RESUME_INTEL_ALLOW_HASH_EMBEDDING_FALLBACK: "0"
      APIFY_API_TOKEN_FILE: /run/candidatesignal-secrets/apify-api-token
      LINKEDIN_APIFY_ACTOR_ID: ${LINKEDIN_APIFY_ACTOR_ID:-LpVuK3Zozwuipa5bp}
      LINKEDIN_APIFY_SCRAPER_MODE: ${LINKEDIN_APIFY_SCRAPER_MODE:-Profile details no email ($4 per 1k)}
      OCR_MODE: remote
      OCR_REMOTE_URL: ${OCR_REMOTE_URL}
      OCR_REMOTE_AUTH: google_id_token
      OCR_REMOTE_AUDIENCE: ${OCR_REMOTE_AUDIENCE}
      OCR_REMOTE_TOKEN_FILE: /run/candidatesignal-secrets/ocr-internal-token
      OCR_REMOTE_TIMEOUT_SECONDS: ${OCR_REMOTE_TIMEOUT_SECONDS:-1800}
    ports:
      - "127.0.0.1:${API_PORT:-8010}:8010"
    volumes:
      - app_data:/app/data
      - ./secrets:/run/candidatesignal-secrets:ro
    depends_on:
      - cloudsql-proxy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "scripts/run_parse_worker.py", "--worker-id", "gcp-vm-worker"]
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-secrets/database-url
      RESUME_INTEL_JSON_LOGS: "1"
      RESUME_INTEL_STORAGE_BACKEND: gcs
      RESUME_INTEL_GCS_BUCKET: ${RESUME_INTEL_GCS_BUCKET}
      RESUME_INTEL_ALERT_WEBHOOK_URL_FILE: /run/candidatesignal-secrets/alert-webhook-url
      RESUME_INTEL_LITELLM_BASE_URL: ${RESUME_INTEL_LITELLM_BASE_URL:-https://api.openai.com/v1}
      RESUME_INTEL_LITELLM_API_KEY_FILE: /run/candidatesignal-secrets/litellm-api-key
      RESUME_INTEL_LITELLM_MODEL: ${RESUME_INTEL_LITELLM_MODEL:-openai/gpt-5-nano}
      RESUME_INTEL_EMBEDDING_MODEL: ${RESUME_INTEL_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RESUME_INTEL_ALLOW_HASH_EMBEDDING_FALLBACK: "0"
      APIFY_API_TOKEN_FILE: /run/candidatesignal-secrets/apify-api-token
      LINKEDIN_APIFY_ACTOR_ID: ${LINKEDIN_APIFY_ACTOR_ID:-LpVuK3Zozwuipa5bp}
      LINKEDIN_APIFY_SCRAPER_MODE: ${LINKEDIN_APIFY_SCRAPER_MODE:-Profile details no email ($4 per 1k)}
      OCR_MODE: remote
      OCR_REMOTE_URL: ${OCR_REMOTE_URL}
      OCR_REMOTE_AUTH: google_id_token
      OCR_REMOTE_AUDIENCE: ${OCR_REMOTE_AUDIENCE}
      OCR_REMOTE_TOKEN_FILE: /run/candidatesignal-secrets/ocr-internal-token
      OCR_REMOTE_TIMEOUT_SECONDS: ${OCR_REMOTE_TIMEOUT_SECONDS:-1800}
    volumes:
      - app_data:/app/data
      - ./secrets:/run/candidatesignal-secrets:ro
    depends_on:
      - cloudsql-proxy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-secrets/database-url
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
      SERVER_API_BASE: http://api:8010
      BETTER_AUTH_SECRET_FILE: /run/candidatesignal-secrets/better-auth-secret
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
    ports:
      - "127.0.0.1:${UI_PORT:-3001}:3001"
    depends_on:
      - api
    volumes:
      - ./secrets:/run/candidatesignal-secrets:ro
    restart: unless-stopped

  api-staging:
    profiles: ["staging"]
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-staging-secrets/database-url
      BETTER_AUTH_SECRET_FILE: /run/candidatesignal-staging-secrets/better-auth-secret
      BETTER_AUTH_URL: ${STAGING_BETTER_AUTH_URL:-https://staging.candidatesignal.ai}
      RESUME_INTEL_BOOTSTRAP_TOKEN_FILE: /run/candidatesignal-staging-secrets/bootstrap-token
      RESUME_INTEL_ENABLE_LEGACY_AUTH: "0"
      RESUME_INTEL_ALLOW_UNSIGNED_BETTER_AUTH_BEARER: "0"
      RESUME_INTEL_SELF_SIGNUP_ENABLED: ${STAGING_RESUME_INTEL_SELF_SIGNUP_ENABLED:-1}
      RESUME_INTEL_SELF_SIGNUP_SEAT_LIMIT: ${STAGING_RESUME_INTEL_SELF_SIGNUP_SEAT_LIMIT:-5}
      RESUME_INTEL_JSON_LOGS: "1"
      RESUME_INTEL_STORAGE_BACKEND: gcs
      RESUME_INTEL_GCS_BUCKET: ${STAGING_RESUME_INTEL_GCS_BUCKET:-candidatesignal-staging-documents}
      RESUME_INTEL_ALERT_WEBHOOK_URL_FILE: /run/candidatesignal-staging-secrets/alert-webhook-url
      RESUME_INTEL_MAIL_ENABLED: ${STAGING_RESUME_INTEL_MAIL_ENABLED:-0}
      RESUME_INTEL_MAIL_DRY_RUN: ${STAGING_RESUME_INTEL_MAIL_DRY_RUN:-1}
      RESUME_INTEL_MAIL_PROVIDER: ${STAGING_RESUME_INTEL_MAIL_PROVIDER:-resend}
      RESUME_INTEL_MAIL_FROM_EMAIL: ${STAGING_RESUME_INTEL_MAIL_FROM_EMAIL:-no-reply@candidatesignal.ai}
      RESUME_INTEL_MAIL_FROM_NAME: ${STAGING_RESUME_INTEL_MAIL_FROM_NAME:-candidateSignal.ai Staging}
      RESUME_INTEL_MAIL_REPLY_TO: ${STAGING_RESUME_INTEL_MAIL_REPLY_TO:-}
      RESUME_INTEL_APP_BASE_URL: ${STAGING_RESUME_INTEL_APP_BASE_URL:-https://staging.candidatesignal.ai}
      RESEND_API_KEY_FILE: /run/candidatesignal-staging-secrets/resend-api-key
      RESUME_INTEL_LITELLM_BASE_URL: ${STAGING_RESUME_INTEL_LITELLM_BASE_URL:-https://api.openai.com/v1}
      RESUME_INTEL_LITELLM_API_KEY_FILE: /run/candidatesignal-staging-secrets/litellm-api-key
      RESUME_INTEL_LITELLM_MODEL: ${STAGING_RESUME_INTEL_LITELLM_MODEL:-openai/gpt-5-nano}
      RESUME_INTEL_EMBEDDING_MODEL: ${STAGING_RESUME_INTEL_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RESUME_INTEL_ALLOW_HASH_EMBEDDING_FALLBACK: "0"
      APIFY_API_TOKEN_FILE: /run/candidatesignal-staging-secrets/apify-api-token
      LINKEDIN_APIFY_ACTOR_ID: ${STAGING_LINKEDIN_APIFY_ACTOR_ID:-LpVuK3Zozwuipa5bp}
      LINKEDIN_APIFY_SCRAPER_MODE: ${STAGING_LINKEDIN_APIFY_SCRAPER_MODE:-Profile details no email ($4 per 1k)}
      OCR_MODE: remote
      OCR_REMOTE_URL: ${OCR_REMOTE_URL}
      OCR_REMOTE_AUTH: google_id_token
      OCR_REMOTE_AUDIENCE: ${OCR_REMOTE_AUDIENCE}
      OCR_REMOTE_TOKEN_FILE: /run/candidatesignal-staging-secrets/ocr-internal-token
      OCR_REMOTE_TIMEOUT_SECONDS: ${OCR_REMOTE_TIMEOUT_SECONDS:-1800}
    ports:
      - "127.0.0.1:${STAGING_API_PORT:-8110}:8010"
    volumes:
      - app_data_staging:/app/data
      - ./secrets-staging:/run/candidatesignal-staging-secrets:ro
    depends_on:
      - cloudsql-proxy
    restart: unless-stopped

  worker-staging:
    profiles: ["staging"]
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "scripts/run_parse_worker.py", "--worker-id", "gcp-vm-staging-worker"]
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-staging-secrets/database-url
      RESUME_INTEL_JSON_LOGS: "1"
      RESUME_INTEL_STORAGE_BACKEND: gcs
      RESUME_INTEL_GCS_BUCKET: ${STAGING_RESUME_INTEL_GCS_BUCKET:-candidatesignal-staging-documents}
      RESUME_INTEL_ALERT_WEBHOOK_URL_FILE: /run/candidatesignal-staging-secrets/alert-webhook-url
      RESUME_INTEL_LITELLM_BASE_URL: ${STAGING_RESUME_INTEL_LITELLM_BASE_URL:-https://api.openai.com/v1}
      RESUME_INTEL_LITELLM_API_KEY_FILE: /run/candidatesignal-staging-secrets/litellm-api-key
      RESUME_INTEL_LITELLM_MODEL: ${STAGING_RESUME_INTEL_LITELLM_MODEL:-openai/gpt-5-nano}
      RESUME_INTEL_EMBEDDING_MODEL: ${STAGING_RESUME_INTEL_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RESUME_INTEL_ALLOW_HASH_EMBEDDING_FALLBACK: "0"
      APIFY_API_TOKEN_FILE: /run/candidatesignal-staging-secrets/apify-api-token
      LINKEDIN_APIFY_ACTOR_ID: ${STAGING_LINKEDIN_APIFY_ACTOR_ID:-LpVuK3Zozwuipa5bp}
      LINKEDIN_APIFY_SCRAPER_MODE: ${STAGING_LINKEDIN_APIFY_SCRAPER_MODE:-Profile details no email ($4 per 1k)}
      OCR_MODE: remote
      OCR_REMOTE_URL: ${OCR_REMOTE_URL}
      OCR_REMOTE_AUTH: google_id_token
      OCR_REMOTE_AUDIENCE: ${OCR_REMOTE_AUDIENCE}
      OCR_REMOTE_TOKEN_FILE: /run/candidatesignal-staging-secrets/ocr-internal-token
      OCR_REMOTE_TIMEOUT_SECONDS: ${OCR_REMOTE_TIMEOUT_SECONDS:-1800}
    volumes:
      - app_data_staging:/app/data
      - ./secrets-staging:/run/candidatesignal-staging-secrets:ro
    depends_on:
      - cloudsql-proxy
    restart: unless-stopped

  ui-staging:
    profiles: ["staging"]
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
        NEXT_PUBLIC_DEPLOY_ENV: staging
    environment:
      DATABASE_URL_FILE: /run/candidatesignal-staging-secrets/database-url
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      NEXT_PUBLIC_DEPLOY_ENV: staging
      SERVER_API_BASE: http://api-staging:8010
      BETTER_AUTH_SECRET_FILE: /run/candidatesignal-staging-secrets/better-auth-secret
      BETTER_AUTH_URL: ${STAGING_BETTER_AUTH_URL:-https://staging.candidatesignal.ai}
      BETTER_AUTH_TRUSTED_ORIGINS: ${STAGING_BETTER_AUTH_TRUSTED_ORIGINS:-https://staging.candidatesignal.ai}
    ports:
      - "127.0.0.1:${STAGING_UI_PORT:-3101}:3001"
    depends_on:
      - api-staging
    volumes:
      - ./secrets-staging:/run/candidatesignal-staging-secrets:ro
    restart: unless-stopped

volumes:
  app_data:
  app_data_staging:
  caddy_data:
  caddy_config:
